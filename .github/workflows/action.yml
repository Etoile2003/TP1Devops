name: CI - Kubernetes Integration Tests

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Build Docker images
        run: |
          docker build -t etoilesanss/tp1dockerap:latest -f Dockerfile .
          
