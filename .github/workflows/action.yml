name: CI - Kubernetes Integration Tests
on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest Test/TestPrice.py
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Etoile2003_TP1Devops
            -Dsonar.organization=etoilesanss
            -Dsonar.sources=.
            -Dsonar.tests=Test
            -Dsonar.exclusions=**/__pycache__/**,**/.pytest_cache/**,**/.venv/**
      - name: Build Docker image
        run: docker build -t etoilesanss/tp1dockerap:latest .